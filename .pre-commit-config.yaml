repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-ast
        name: validate Python syntax

  - repo: local
    hooks:
      - id: gate-tests
        name: gate tests
        entry: python3 -m pytest tests/test_gate.py -q --tb=short
        language: system
        pass_filenames: false
        always_run: true
